<div class="bb-assistant bb-ai-assistant" data-bb-assistant>
    <section
        class="bb-assistant-panel bb-ai-panel"
        id="bbAssistantPanel"
        role="dialog"
        aria-modal="false"
        aria-labelledby="bbAssistantTitle"
        hidden
    >
        <header class="bb-assistant-header">
            <div class="bb-assistant-identity">
                <span class="bb-panel-bot" aria-hidden="true">
                    <span class="bb-panel-bot-eye"></span><span class="bb-panel-bot-eye"></span>
                </span>
                <div>
                    <p class="eyebrow">BusinessBuilder AI</p>
                    <h2 id="bbAssistantTitle">How can I help you build today?</h2>
                </div>
            </div>
            <button type="button" class="bb-assistant-close" data-bb-assistant-close aria-label="Close AI assistant">×</button>
        </header>

        <p class="bb-assistant-intro">Search tools, find pages, or jump to your next business step.</p>

        <label class="bb-assistant-search" for="bbAssistantSearch">
            <span aria-hidden="true">⌕</span>
            <input
                id="bbAssistantSearch"
                type="search"
                placeholder="Search Shopify, Canva, products, pricing…"
                autocomplete="off"
                aria-label="Search BusinessBuilder AI tools"
                aria-controls="bbAssistantResults"
            >
        </label>

        <div class="bb-assistant-chips" aria-label="Quick actions">
            <button type="button" class="bb-assistant-chip" data-bb-assistant-query="generate store">Generate My Store</button>
            <button type="button" class="bb-assistant-chip" data-bb-assistant-query="find products">Find Products</button>
            <button type="button" class="bb-assistant-chip" data-bb-assistant-query="business plan">Create Business Plan</button>
            <button type="button" class="bb-assistant-chip" data-bb-assistant-query="connect Shopify">Connect Shopify</button>
            <button type="button" class="bb-assistant-chip" data-bb-assistant-query="connect Canva">Connect Canva</button>
            <button type="button" class="bb-assistant-chip" data-bb-assistant-query="price product">Pricing Advisor</button>
            <button type="button" class="bb-assistant-chip" data-bb-assistant-query="payment">Payment Guide</button>
            <button type="button" class="bb-assistant-chip" data-bb-assistant-query="find supplier">Supplier Finder</button>
            <button type="button" class="bb-assistant-chip" data-bb-assistant-query="email marketing">Email Marketing</button>
            <button type="button" class="bb-assistant-chip" data-bb-assistant-query="domain">Domain Helper</button>
            <button type="button" class="bb-assistant-chip" data-bb-assistant-query="buy domain">Buy a Domain</button>
            <button type="button" class="bb-assistant-chip" data-bb-assistant-query="business setup">Business Setup</button>
            <button type="button" class="bb-assistant-chip" data-bb-assistant-query="launch">Launch Readiness</button>
            <button type="button" class="bb-assistant-chip" data-bb-assistant-query="support">Support</button>
        </div>

        <div class="bb-assistant-results" id="bbAssistantResults" aria-live="polite"></div>

        <footer class="bb-assistant-footer">
            <span>Local tool search is instant and free.</span>
            <a href="/" class="bb-assistant-chat-link">Ask AI in Chat</a>
        </footer>
    </section>

    <button type="button" class="bb-mascot-bubble" data-bb-mascot-bubble aria-label="Open AI assistant">
        <span data-bb-mascot-message>Need help?</span>
    </button>

    <button
        type="button"
        class="bb-assistant-toggle bb-ai-toggle bb-mascot-launcher bb-mascot-happy"
        data-bb-assistant-toggle
        aria-label="Open AI assistant"
        aria-controls="bbAssistantPanel"
        aria-expanded="false"
    >
        <span class="bb-mascot" aria-hidden="true">
            <span class="bb-mascot-antenna"><i></i></span>
            <span class="bb-mascot-ear left"></span><span class="bb-mascot-ear right"></span>
            <span class="bb-mascot-head">
                <span class="bb-mascot-face">
                    <i class="bb-mascot-eye left"></i><i class="bb-mascot-eye right"></i>
                    <i class="bb-mascot-mouth"></i>
                </span>
            </span>
            <span class="bb-mascot-body"><i class="bb-mascot-core">✦</i></span>
            <span class="bb-mascot-arm"></span>
            <span class="bb-mascot-shadow"></span>
        </span>
    </button>
</div>

<script>

            "/shopify_settings": { bubble: "Connect Shopify?", chips: [["Token guide", "shopify token"], ["Test connection", "connect Shopify"], ["Create draft products", "Shopify products"], ["Store setup", "generate store"]] },
            "/canva_settings": { bubble: "Connect Canva?", chips: [["Canva OAuth help", "connect Canva"], ["Branding brief", "Canva branding"], ["Design assets", "Canva design"], ["Marketing design", "Canva marketing"]] },
            "/settings": { bubble: "Manage your account", chips: [["Plan and billing", "pricing plan"], ["Integrations", "app connection"], ["Theme", "settings theme"], ["Support", "support"]] },
            "/pricing": { bubble: "Choose a plan", chips: [["Compare plans", "pricing plan"], ["Starter", "Starter plan"], ["Pro", "Pro plan"], ["Premium", "Premium plan"]] },
            "/support": { bubble: "Need support?", chips: [["Billing help", "billing help"], ["Shopify help", "shopify support"], ["Canva help", "canva support"], ["Contact support", "support"]] }
        };

        const tools = [
            { name: "Dashboard", description: "See your plan, progress, and recommended next step.", route: "/dashboard", category: "Workspace", plan: "Starter" },
            { name: "Build Center", description: "Track every step from business idea to launch.", route: "/build_center", category: "Workspace", plan: "Starter" },
            { name: "AI Store Agent", description: "Generate, review, edit, approve, or delete store drafts.", route: "/ai_store_agent", category: "Store", plan: "Starter / Pro", keywords: "shopify store products draft generate store" },
            { name: "Generate My Store", description: "Create a complete reviewable store package from your workflow.", route: "/store_builder", category: "Store", plan: "Pro", keywords: "build store shopify website" },
            { name: "Product Finder", description: "Research product ideas, positioning, and sourcing paths.", route: "/product_finder", category: "Research", plan: "Starter", keywords: "products sell product ideas" },
            { name: "Supplier Finder", description: "Compare supplier types and platforms before buying inventory.", route: "/supplier_finder", category: "Research", plan: "Starter", keywords: "supplier shipping costs inventory" },
            { name: "Pricing Advisor", description: "Create low, standard, and premium pricing guidance.", route: "/pricing_advisor", category: "Planning", plan: "Starter", keywords: "price plan upgrade cost margin" },
            { name: "Payment Guide", description: "Compare Paystack, PayPal, EFT, cards, and other payment options.", route: "/payment_guide", category: "Planning", plan: "Starter", keywords: "payments money receive money checkout shopify payments" },
            { name: "Email Marketing Assistant", description: "Draft campaigns, subject lines, calls to action, and follow-ups.", route: "/email_marketing", category: "Marketing", plan: "Pro" },
            { name: "Domain Buying Assistant", description: "Find domain names, compare providers, review renewal risks, and create a safe buying checklist.", route: "/domain_buying_assistant", category: "Website", plan: "Starter / Pro", keywords: "buy domain domain name website name register domain availability provider renewal DNS connect domain" },
            { name: "Domain/DNS Helper", description: "Choose a domain and understand DNS connection steps.", route: "/domain_helper", category: "Website", plan: "Starter" },
            { name: "Business Setup Agent", description: "Plan business name, email, domain, branding, payments, shipping, admin, tax reminders, and launch tasks.", route: "/business_setup_agent", category: "Planning", plan: "Starter / Premium", keywords: "register business business setup business email legal tax SARS shipping payments admin checklist" },
            { name: "Business Launch Assistant", description: "Create a personalised, beginner-friendly roadmap from business idea to launch.", route: "/business_launch_assistant", category: "Launch", plan: "Starter", keywords: "start business business checklist what do I do next launch plan business idea" },
            { name: "Idea Validation Agent", description: "Test demand assumptions, risks, competitors, and a low-cost MVP.", route: "/idea_validation", category: "Planning", plan: "Starter", keywords: "idea validate validation demand MVP go no go customer" },
            { name: "Startup Cost Planner", description: "Plan one-time, monthly, must-have, optional, and later startup costs.", route: "/startup_cost_planner", category: "Money", plan: "Starter", keywords: "budget startup cost money break even business costs" },
            { name: "Name & Brand Agent", description: "Create name ideas, taglines, visual direction, and a Canva-ready logo brief.", route: "/brand_agent", category: "Branding", plan: "Starter", keywords: "business name brand logo colour color tagline CIPC trademark social handle" },
            { name: "Registration & Tax Guide", description: "Create a general admin checklist to verify with CIPC, SARS, official sources, or a professional.", route: "/registration_tax_guide", category: "Admin", plan: "Pro", keywords: "register registration tax SARS CIPC legal VAT turnover tax admin" },
            { name: "Shipping Setup Agent", description: "Plan delivery, couriers, fulfilment, packaging, returns, and customer updates.", route: "/shipping_setup", category: "Operations", plan: "Starter", keywords: "shipping delivery courier fulfillment fulfilment packaging pickup returns" },
            { name: "Store Content Generator", description: "Draft homepage, product, FAQ, contact, shipping, refund, privacy, and terms content.", route: "/store_content_generator", category: "Store", plan: "Pro", keywords: "policy policies returns refund privacy about contact FAQ website copy store content" },
            { name: "Marketing Launch Agent", description: "Create a launch campaign, seven-day content plan, email, WhatsApp, social, and ad drafts.", route: "/marketing_launch_agent", category: "Marketing", plan: "Pro", keywords: "marketing launch social media email WhatsApp Instagram TikTok ads influencer" },
            { name: "App Connection Agent", description: "Find approved apps, connection guides, and approval drafts.", route: "/app_connection_agent", category: "Integrations", plan: "Pro / Premium", keywords: "connect app integration automation" },
            { name: "Business Workflow", description: "Save the business details used by plans and AI drafts.", route: "/business_workflow", category: "Planning", plan: "Starter" },
            { name: "Business Plans", description: "Create and review business plans from saved workflow answers.", route: "/business_workflow", category: "Planning", plan: "Starter" },
            { name: "Launch Readiness", description: "Check what is complete and what is still missing before launch.", route: "/launch_readiness", category: "Launch", plan: "Starter" },
            { name: "Launch Package", description: "Bring strategy, drafts, branding, and launch steps together.", route: "/launch_package", category: "Launch", plan: "Pro" },
            { name: "Shopify Settings", description: "Connect or test your Shopify store connection.", route: "/shopify_settings", category: "Integrations", plan: "Pro", keywords: "shopify token store products payments connect" },
            { name: "Canva Settings", description: "Connect Canva through the official authorization flow.", route: "/canva_settings", category: "Integrations", plan: "Pro", keywords: "canva logo design branding marketing assets oauth" },
            { name: "Settings", description: "Manage your account, plan, integrations, theme, and security.", route: "/settings", category: "Account", plan: "Starter" },
            { name: "Pricing", description: "Compare Starter, Pro, and Premium Build packages.", route: "/pricing", category: "Account", plan: "Public", keywords: "plan upgrade starter pro premium billing" },
            { name: "Support", description: "Get help with billing, integrations, AI output, or your account.", route: "/support", category: "Help", plan: "Starter", keywords: "help contact billing shopify canva" },
            { name: "Examples", description: "View sample BusinessBuilder AI outputs.", route: "/examples", category: "Help", plan: "Public" },
            { name: "Projects", description: "Organize and revisit your business projects.", route: "/projects", category: "Workspace", plan: "Starter" },
            { name: "Onboarding", description: "Update your business idea, market, budget, and goals.", route: "/onboarding", category: "Workspace", plan: "Starter" }
        ];

        const helpResponses = [
            { terms: ["connect shopify", "shopify token", "shopify connect"], text: "To connect Shopify, go to Shopify Settings. You’ll need your Shopify store domain and Admin API token.", label: "Open Shopify Settings", route: "/shopify_settings" },
            { terms: ["connect canva", "canva connect", "canva oauth"], text: "Connect Canva through the official Canva authorization flow.", label: "Open Canva Settings", route: "/canva_settings" },
            { terms: ["price product", "product price", "pricing", "how much charge"], text: "Use Pricing Advisor to calculate low, standard, and premium pricing options.", label: "Open Pricing Advisor", route: "/pricing_advisor" },
            { terms: ["receive money", "payment", "paystack", "paypal"], text: "Use Payment Guide to compare Paystack, PayPal, EFT, card payments, and Shopify payment options.", label: "Open Payment Guide", route: "/payment_guide" },
            { terms: ["find supplier", "supplier", "alibaba", "aliexpress"], text: "Use Supplier Finder to compare Amazon-style research, local suppliers, Alibaba, AliExpress, print-on-demand, and other options.", label: "Open Supplier Finder", route: "/supplier_finder" },
            { terms: ["launch", "ready to launch", "launch checklist"], text: "Use Launch Readiness to check what is missing before launch.", label: "Open Launch Readiness", route: "/launch_readiness" },
            { terms: ["buy domain", "domain name", "website name", "connect domain", "dns"], text: "Use Domain Buying Assistant to shortlist names, compare providers, understand renewal risks, and prepare safe DNS steps. Check availability with the provider before buying.", label: "Open Domain Buying Assistant", route: "/domain_buying_assistant" },
            { terms: ["register business", "business setup", "business email", "legal", "tax", "sars", "shipping"], text: "Use Business Setup Agent for a general setup roadmap. Verify registration, tax, legal, and compliance requirements with official local sources and qualified professionals.", label: "Open Business Setup Agent", route: "/business_setup_agent" },
            { terms: ["start business", "business checklist", "what do i do next", "launch plan"], text: "Use Business Launch Assistant for one practical roadmap covering validation, budget, brand, operations, store setup, marketing, and approval boundaries.", label: "Open Business Launch Assistant", route: "/business_launch_assistant" },
            { terms: ["validate idea", "is my idea good", "demand", "mvp"], text: "Use Idea Validation Agent to test assumptions with low-cost experiments before committing heavily.", label: "Validate My Idea", route: "/idea_validation" },
            { terms: ["startup cost", "budget planner", "how much money", "business costs"], text: "Use Startup Cost Planner to separate must-haves, monthly costs, optional costs, and items that can wait.", label: "Plan Startup Costs", route: "/startup_cost_planner" },
            { terms: ["business name", "brand name", "tagline", "logo brief"], text: "Use the Name & Brand Agent for ideas and direction, then verify domains, social handles, CIPC records, and trademarks yourself.", label: "Open Brand Agent", route: "/brand_agent" },
            { terms: ["cipc", "sars", "vat", "turnover tax", "registration tax"], text: "Use the Registration & Tax Guide for general questions to verify. It does not submit forms or replace CIPC, SARS, or a qualified professional.", label: "Open Registration & Tax Guide", route: "/registration_tax_guide" },
            { terms: ["shipping", "delivery", "courier", "fulfilment", "fulfillment"], text: "Use Shipping Setup Agent to plan fulfilment, packaging, delivery options, returns, and customer updates. Verify final courier rates directly.", label: "Plan Shipping", route: "/shipping_setup" },
            { terms: ["policy", "returns", "refund", "privacy", "store content", "website copy"], text: "Use Store Content Generator for reviewable page and policy drafts. Adapt legal wording to your real operations and local requirements.", label: "Draft Store Content", route: "/store_content_generator" },
            { terms: ["marketing launch", "social media", "whatsapp campaign", "launch content"], text: "Use Marketing Launch Agent for campaign and message drafts. It never posts, sends, or spends automatically.", label: "Plan My Launch Marketing", route: "/marketing_launch_agent" },
            { terms: ["support", "help account", "billing help"], text: "You can contact support for billing, Shopify, Canva, AI output, or account help.", label: "Open Support", route: "/support" }
        ];

        const pageSuggestions = {
            "/dashboard": ["Business Launch Assistant", "Idea Validation Agent", "Startup Cost Planner", "Launch Readiness"],
            "/build_center": ["Business Workflow", "Product Finder", "AI Store Agent", "Launch Readiness"],
            "/ai_store_agent": ["Product Finder", "Shopify Settings", "Canva Settings", "Launch Readiness"],
            "/product_finder": ["Supplier Finder", "Pricing Advisor", "AI Store Agent", "Build Center"],
            "/supplier_finder": ["Product Finder", "Pricing Advisor", "Payment Guide", "Build Center"],
            "/pricing_advisor": ["Supplier Finder", "Payment Guide", "AI Store Agent", "Build Center"],
            "/payment_guide": ["Pricing Advisor", "Shopify Settings", "Settings", "Support"],
            "/settings": ["Shopify Settings", "Canva Settings", "Pricing", "Support"],
            "/domain_buying_assistant": ["Domain/DNS Helper", "Business Setup Agent", "Shopify Settings", "Support"],
            "/business_setup_agent": ["Domain Buying Assistant", "Payment Guide", "Canva Settings", "Launch Readiness"]
            ,"/business_launch_assistant": ["Idea Validation Agent", "Startup Cost Planner", "Name & Brand Agent", "Launch Readiness"]
            ,"/idea_validation": ["Business Launch Assistant", "Startup Cost Planner", "Product Finder", "Supplier Finder"]
            ,"/startup_cost_planner": ["Pricing Advisor", "Payment Guide", "Business Launch Assistant", "Build Center"]
            ,"/brand_agent": ["Domain Buying Assistant", "Canva Settings", "Store Content Generator", "Business Launch Assistant"]
            ,"/registration_tax_guide": ["Business Setup Agent", "Startup Cost Planner", "Support", "Launch Readiness"]
            ,"/shipping_setup": ["Supplier Finder", "Store Content Generator", "Shopify Settings", "Launch Readiness"]
            ,"/store_content_generator": ["AI Store Agent", "Marketing Launch Agent", "Shopify Settings", "Launch Readiness"]
            ,"/marketing_launch_agent": ["Email Marketing Assistant", "Canva Settings", "Launch Readiness", "Build Center"]
        };

        let moodTimer = null;

        function setMood(mood, temporary) {
            toggle.classList.remove("bb-mascot-happy", "bb-mascot-thinking", "bb-mascot-success");
            toggle.classList.add("bb-mascot-" + mood);
            if (moodTimer) window.clearTimeout(moodTimer);
            if (temporary) {
                moodTimer = window.setTimeout(function() {
                    setMood(panel.hidden ? "happy" : "thinking", false);
                }, 650);
            }
        }

        function applyPageContext() {
            const context = routeContexts[currentPath] || defaultContext;
            bubbleMessage.textContent = context.bubble;
            quickChips.replaceChildren();
            context.chips.forEach(function(item) {
                const chip = document.createElement("button");
                chip.type = "button";
                chip.className = "bb-assistant-chip";
                chip.setAttribute("data-bb-assistant-query", item[1]);
                chip.textContent = item[0];
                quickChips.appendChild(chip);
            });
        }

        function normalize(value) {
            return (value || "").toLowerCase().trim().replace(/[^a-z0-9]+/g, " ");
        }

        function makeLink(item) {
            const link = document.createElement("a");
            link.className = "bb-assistant-result";
            link.href = item.route;
            const copy = document.createElement("span");
            const title = document.createElement("strong");
            title.textContent = item.name;
            const description = document.createElement("small");
            description.textContent = item.description;
            copy.append(title, description);
            const meta = document.createElement("span");
            meta.className = "bb-assistant-result-meta";
            meta.textContent = item.category + " · " + item.plan;
            link.append(copy, meta);
            link.addEventListener("click", function() { setMood("success", true); });
            return link;
        }

        function render(query) {
            const normalized = normalize(query);
            results.replaceChildren();

            if (!normalized) {
                const heading = document.createElement("p");
                heading.className = "bb-assistant-results-label";
                heading.textContent = pageSuggestions[currentPath] ? "Useful from this page" : "Popular tools";
                results.appendChild(heading);
                const suggestedNames = pageSuggestions[currentPath];
                const suggestedTools = suggestedNames
                    ? suggestedNames.map(function(name) { return tools.find(function(item) { return item.name === name; }); }).filter(Boolean)
                    : [tools[1], tools[4], tools[6], tools[8]];
                suggestedTools.forEach(function(item) {
                    results.appendChild(makeLink(item));
                });
                return;
            }

            const help = helpResponses.find(function(item) {
                return item.terms.some(function(term) { return normalized.includes(normalize(term)); });
            });
            if (help) {
                const card = document.createElement("div");
                card.className = "bb-assistant-help-response";
                const text = document.createElement("p");
                text.textContent = help.text;
                const link = document.createElement("a");
                link.href = help.route;
                link.className = "primary-button";
                link.textContent = help.label;
                card.append(text, link);
                results.appendChild(card);
            }

            const words = normalized.split(" ").filter(Boolean);
            const matches = tools.filter(function(item) {
                const haystack = normalize(item.name + " " + item.description + " " + item.category + " " + (item.keywords || ""));
                return words.every(function(word) { return haystack.includes(word); });
            }).slice(0, 6);

            matches.forEach(function(item) { results.appendChild(makeLink(item)); });

            if (!help && !matches.length) {
                const empty = document.createElement("div");
                empty.className = "bb-assistant-empty";
                const title = document.createElement("strong");
                title.textContent = "I couldn’t find that tool yet.";
                const suggestion = document.createElement("p");
                suggestion.textContent = "Try: Shopify, Canva, products, pricing, payments, domain, support.";
                const chat = document.createElement("a");
                chat.href = "/";
                chat.className = "secondary-button";
                chat.textContent = "Ask AI";
                empty.append(title, suggestion, chat);
                results.appendChild(empty);
            }
        }

        function setOpen(open) {
            panel.hidden = !open;
            toggle.setAttribute("aria-expanded", open ? "true" : "false");
            root.classList.toggle("is-open", open);
            setMood(open ? "thinking" : "happy", false);
            if (open) {
                render(search.value);
                window.setTimeout(function() { search.focus(); }, 30);
            } else {
                toggle.focus();
            }
        }

        applyPageContext();
        toggle.addEventListener("click", function() { setOpen(panel.hidden); });
        bubble.addEventListener("click", function() { setOpen(true); });
        closeButton.addEventListener("click", function() { setOpen(false); });
        search.addEventListener("input", function() {
            setMood(search.value || !panel.hidden ? "thinking" : "happy", false);
            render(search.value);
        });
        root.querySelectorAll("[data-bb-assistant-query]").forEach(function(chip) {
            chip.addEventListener("click", function() {
                search.value = chip.getAttribute("data-bb-assistant-query");
                render(search.value);
                setMood("success", true);
                search.focus();
            });
        });
        document.addEventListener("keydown", function(event) {
            if (event.key === "Escape" && !panel.hidden) setOpen(false);
        });
    })();
</script>
