<!DOCTYPE html>
<html>
<head>
    <title>Something Went Wrong - BusinessBuilder AI</title>

</head>

<body class="error-body">
    <main class="error-card">
        <div class="brand-logo">B</div>
        <p class="eyebrow">BusinessBuilder AI</p>

</html>
