<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - BusinessBuilder AI</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="auth-body">
    <div class="auth-card">
        <a href="/landing" class="auth-brand">
            <span class="brand-logo">B</span>
            <span>BusinessBuilder AI</span>
        </a>
        <p class="eyebrow">Start Your Build</p>
        <h1>Create your workspace</h1>
        <p>Set up your account, activate the Starter Package, and follow the guided workflow.</p>
        {% if message %}
            <p class="form-notice">{{ message }}</p>
        {% endif %}
        <form method="POST">
            <input name="email" type="email" placeholder="Email" required>
            <input name="password" type="password" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </form>
        <p>Already have an account? <a href="/login">Log in</a></p>
        <p><a href="/pricing">Review the Starter Package</a></p>
    </div>
</body>
</html>
