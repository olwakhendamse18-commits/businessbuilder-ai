{% if session.get("user_id") %}
    {% include "_ai_assistant_widget.html" %}
{% endif %}

<script>
    (function() {
        const sidebar = document.querySelector(".sidebar");

        if (sidebar) {
            document.documentElement.classList.add("mobile-nav-ready");

            const navButton = document.createElement("button");
            navButton.type = "button";
            navButton.className = "mobile-nav-toggle";
            navButton.setAttribute("aria-expanded", "false");
            navButton.textContent = "Menu";
            sidebar.insertBefore(navButton, sidebar.firstChild);

            navButton.addEventListener("click", function() {
                const isOpen = sidebar.classList.toggle("mobile-nav-open");
                navButton.setAttribute("aria-expanded", isOpen ? "true" : "false");
            });
        }

        const toggle = document.getElementById("settingsMenuToggle");
        const menu = document.getElementById("settingsMenu");

        if (toggle && menu) {
            toggle.addEventListener("click", function() {
                const isHidden = menu.hasAttribute("hidden");
                if (isHidden) {
                    menu.removeAttribute("hidden");
                    toggle.setAttribute("aria-expanded", "true");
                } else {
                    menu.setAttribute("hidden", "");
                    toggle.setAttribute("aria-expanded", "false");
                }
            });

            document.addEventListener("click", function(event) {
                if (!menu.contains(event.target) && !toggle.contains(event.target)) {
                    menu.setAttribute("hidden", "");
                    toggle.setAttribute("aria-expanded", "false");
                }
            });
        }

        function applyTheme(theme) {
            const safeTheme = theme || "default";
            document.documentElement.setAttribute("data-theme", safeTheme);
            localStorage.setItem("bbai-theme", safeTheme);
        }

        document.querySelectorAll("[data-theme-choice]").forEach(function(button) {
            button.addEventListener("click", function() {
                const theme = button.getAttribute("data-theme-choice");
                applyTheme(theme);

                fetch("/update_settings", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ theme })
                }).catch(function() {});
            });
        });

        document.querySelectorAll("[data-slider]").forEach(function(slider) {
            if (slider.dataset.sliderReady === "true") {
                return;
            }

            slider.dataset.sliderReady = "true";
            const slides = Array.from(slider.querySelectorAll(".bbai-slide"));
            const prev = slider.querySelector("[data-slider-prev]");
            const next = slider.querySelector("[data-slider-next]");
            const dotsWrap = slider.querySelector("[data-slider-dots]");
            let activeIndex = Math.max(0, slides.findIndex(function(slide) {
                return slide.classList.contains("active");
            }));
            let intervalId = null;

            if (!slides.length) {
                return;
            }

            function showSlide(index) {
                activeIndex = (index + slides.length) % slides.length;
                slides.forEach(function(slide, slideIndex) {
                    slide.classList.toggle("active", slideIndex === activeIndex);
                });

                if (dotsWrap) {
                    Array.from(dotsWrap.children).forEach(function(dot, dotIndex) {
                        dot.classList.toggle("active", dotIndex === activeIndex);
                        dot.setAttribute("aria-current", dotIndex === activeIndex ? "true" : "false");
                    });
                }
            }

            if (dotsWrap) {
                dotsWrap.innerHTML = "";
                slides.forEach(function(_, index) {
                    const dot = document.createElement("button");
                    dot.type = "button";
                    dot.className = "slider-dot";
                    dot.setAttribute("aria-label", "Show slide " + (index + 1));
                    dot.addEventListener("click", function() {
                        showSlide(index);
                    });
                    dotsWrap.appendChild(dot);
                });
            }

            if (prev) {
                prev.addEventListener("click", function() {
                    showSlide(activeIndex - 1);
                });
            }

            if (next) {
                next.addEventListener("click", function() {
                    showSlide(activeIndex + 1);
                });
            }

            function startAutoplay() {
                if (slider.dataset.autoplay !== "true" || intervalId) {
                    return;
                }

                intervalId = window.setInterval(function() {
                    showSlide(activeIndex + 1);
                }, 5200);
            }

            function stopAutoplay() {
                if (intervalId) {
                    window.clearInterval(intervalId);
                    intervalId = null;
                }
            }

            slider.addEventListener("mouseenter", stopAutoplay);
            slider.addEventListener("mouseleave", startAutoplay);
            showSlide(activeIndex);
            startAutoplay();
        });

        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function() {
                navigator.serviceWorker.register("/service-worker.js").catch(function() {});
            });
        }

        let deferredInstallPrompt = null;
        const installButtons = Array.from(document.querySelectorAll(".install-app-button"));

        window.addEventListener("beforeinstallprompt", function(event) {
            event.preventDefault();
            deferredInstallPrompt = event;
            if (localStorage.getItem("bbai-install-dismissed") !== "1") {
                installButtons.forEach(function(button) {
                    button.hidden = false;
                });
            }
        });

        installButtons.forEach(function(installButton) {
            installButton.addEventListener("click", async function() {
                if (!deferredInstallPrompt) {
                    localStorage.setItem("bbai-install-dismissed", "1");
                    installButtons.forEach(function(button) {
                        button.hidden = true;
                    });
                    return;
                }

                deferredInstallPrompt.prompt();
                await deferredInstallPrompt.userChoice;
                deferredInstallPrompt = null;
                installButtons.forEach(function(button) {
                    button.hidden = true;
                });
            });
        });
    })();
</script>
