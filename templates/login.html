<!DOCTYPE html>
<html>
<head>
    <title>Login - BusinessBuilder AI</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="auth-body">
    <div class="auth-card">
        <a href="/landing" class="auth-brand">
            <span class="brand-logo">B</span>
            <span>BusinessBuilder AI</span>
        </a>
        <p class="eyebrow">Welcome Back</p>
        <h1>Log in to your workspace</h1>
        <p>Continue building your business plan, store drafts, and brand assets.</p>
        {% if message %}
            <p class="form-notice">{{ message }}</p>
        {% endif %}
        <form method="POST">
            <input name="email" type="email" placeholder="Email" required>
            <input name="password" type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p>No account yet? <a href="/signup">Create one</a></p>
        <p><a href="/landing">Back to home</a></p>
    </div>
</body>
</html>
